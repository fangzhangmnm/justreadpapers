# 部署 GitHub Pages：prod 分支 → /(线上旧 app)，main 分支 → /dev/(重写监管面)。
# 抄 WebPaint .github/workflows/deploy.yml,改 JRP 的文件列表 + vendor 在 src/vendor。
#
# 各分支自己已 commit 好 dist/jrp-<hash>.mjs(人手跑 build.sh 后 commit)。本 workflow 只
# "组合两分支 → upload",**不重 build**,快且确定。
#
# 第一次 setup:① 手动建 prod 分支(= 当前线上旧 app)→ push:
#     git checkout -b prod && git push -u origin prod
#   ② GitHub 仓库 Settings→Pages→Source 设为 "GitHub Actions"(不是 deploy-from-branch)。
name: Deploy Pages

on:
  push:
    branches: [main, prod]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true   # 新 push 取消在跑的旧 workflow,最后一次必赢(prod race 防踩)

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout prod branch
        uses: actions/checkout@v4
        with:
          ref: prod
          path: prod-tree

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-tree

      - name: Compose site (prod=/, main=/dev/)
        run: |
          mkdir -p site/dev
          # 根级 PWA 元数据 + 图标 + SW + 运行时资源
          for f in index.html manifest.webmanifest service-worker.js styles.css \
                   icon.svg icon-192.png icon-512.png apple-touch-icon-180.png; do
            cp -p prod-tree/$f site/        2>/dev/null || true
            cp -p main-tree/$f site/dev/    2>/dev/null || true
          done
          # 运行时 vendor(pdf.js/msal/vue 源) + bundle 产物。JRP 的 vendor 在 src/vendor。
          # src/ 其余是构建输入,不进 deploy(bundle 后里头啥都不需要)。
          cp -r prod-tree/src/vendor site/vendor      2>/dev/null || true
          cp -r prod-tree/dist       site/dist        2>/dev/null || true
          cp -r main-tree/src/vendor site/dev/vendor  2>/dev/null || true
          cp -r main-tree/dist       site/dev/dist    2>/dev/null || true
          # /dev/ 不要 SW(改完即见,不走缓存层)
          rm -f site/dev/service-worker.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
