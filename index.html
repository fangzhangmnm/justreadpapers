<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>JustReadPapers</title>
<meta name="theme-color" content="#d8c8a8">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg">
<link rel="stylesheet" href="./vendor/pdfjs/web/pdf_viewer.css">
<style>
  html, body { margin: 0; height: 100%; background: #f4efe4; color: #2c2620;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #app, .jrp-shell { height: 100%; }
  .jrp-shell { display: flex; flex-direction: column; }
  .jrp-topbar { flex: none; display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; padding-top: calc(8px + env(safe-area-inset-top));
    background: #ece3d2; border-bottom: 1px solid #d8c8a8; font-size: 13px; }
  .jrp-controls { display: flex; gap: 6px; align-items: center; }
  .jrp-btn { cursor: pointer; padding: 5px 11px; border-radius: 6px; border: 1px solid #d8c8a8;
    background: #f4efe4; color: #2c2620; font-size: 13px; line-height: 1; }
  .jrp-btn:active { background: #e2d6bf; }
  label.jrp-btn { background: #2c2620; color: #f4efe4; border-color: #2c2620; }
  .jrp-fname { opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .jrp-pos { margin-left: auto; opacity: 0.6; font-variant-numeric: tabular-nums; }
  .jrp-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: rgba(44,38,32,0.92); color: #f4efe4; padding: 8px 16px; border-radius: 8px;
    font-size: 13px; z-index: 50; pointer-events: none; }
  .jrp-icon { cursor: pointer; padding: 5px; border-radius: 6px; border: none; background: transparent;
    color: #2c2620; display: inline-flex; align-items: center; }
  .jrp-icon:active { background: #e2d6bf; }
  .jrp-body { position: relative; flex: 1; min-height: 0; }
  .jrp-viewer-wrap { position: absolute; inset: 0; }
  .jrp-viewer { position: absolute; inset: 0; overflow-y: scroll; }
  .jrp-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.18); z-index: 8; }
  .jrp-gallery { position: absolute; left: 0; top: 0; bottom: 0; width: min(340px, 84vw); z-index: 9;
    background: #f4efe4; border-right: 1px solid #d8c8a8; display: flex; flex-direction: column;
    box-shadow: 2px 0 12px rgba(0,0,0,0.12); }
  .jrp-gal-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 10px; border-bottom: 1px solid #e2d6bf; }
  .jrp-gal-acct { font-size: 12px; opacity: 0.6; }
  .jrp-btn-dark { background: #2c2620; color: #f4efe4; border-color: #2c2620; }
  .jrp-crumbs { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid #e2d6bf; }
  .jrp-crumbs a { cursor: pointer; color: #5a4e3a; }
  .jrp-crumb-sep { opacity: 0.4; margin: 0 4px; }
  .jrp-gal-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .jrp-gal-folder, .jrp-gal-file { padding: 9px 14px; cursor: pointer; font-size: 14px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .jrp-gal-folder:hover, .jrp-gal-file:hover { background: #ece3d2; }
  .jrp-tri { display: inline-block; width: 16px; opacity: 0.5; }
  .jrp-gal-file.cached::after { content: '·'; color: #2a8a6a; margin-left: 6px; }
  .jrp-gal-msg { padding: 16px; opacity: 0.5; font-size: 13px; }
  /* pdf.js 暗底改纸感暖底 */
  .jrp-viewer .pdfViewer .page { margin: 10px auto; border: none;
    box-shadow: 0 1px 6px rgba(0,0,0,0.18); }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./dist/jrp-3a37d628708f.mjs"></script>
</body>
</html>
