<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>JustReadPapers</title>
<meta name="theme-color" content="#d8c8a8">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg">
<link rel="stylesheet" href="./vendor/pdfjs/web/pdf_viewer.css">
<script>
  /* FOUC 防护:bundle 加载前就把主题应用上(读 settings 同一 localStorage 键)。 */
  try {
    var m = localStorage.getItem("jrp.set:theme") || "auto";
    var t = m === "auto" ? (matchMedia("(prefers-color-scheme: dark)").matches ? "night" : "day") : m;
    document.documentElement.dataset.theme = t;
  } catch (e) {}
</script>
<style>
  :root {
    --bg:#f4efe4; --fg:#2c2620; --chrome:#ece3d2; --line:#d8c8a8; --line2:#e2d6bf;
    --hover:#ece3d2; --btn-bg:#f4efe4; --dark:#2c2620; --dark-fg:#f4efe4;
    --view-bg:#e6ddc9; --menu-bg:#fbf7ee; --link:#5a4e3a;
  }
  html[data-theme="night"] {
    --bg:#1c1813; --fg:#e9ddc6; --chrome:#241f17; --line:#3a3124; --line2:#2c2519;
    --hover:#2c2519; --btn-bg:#241f17; --dark:#0f0c08; --dark-fg:#e9ddc6;
    --view-bg:#100d09; --menu-bg:#241f17; --link:#c9b98f;
  }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #app, .jrp-shell { height: 100%; }
  .jrp-shell { display: flex; flex-direction: column; }
  /* zen 顶栏：窄、少占空间（阅读时 UI 越少越好）。 */
  .jrp-topbar { flex: none; display: flex; align-items: center; gap: 8px;
    padding: 3px 8px; padding-top: calc(3px + env(safe-area-inset-top));
    background: var(--chrome); border-bottom: 1px solid var(--line); font-size: 12px; }
  .jrp-controls { display: flex; gap: 6px; align-items: center; }
  .jrp-btn { cursor: pointer; padding: 5px 11px; border-radius: 6px; border: 1px solid var(--line);
    background: var(--btn-bg); color: var(--fg); font-size: 13px; line-height: 1; }
  .jrp-btn:active { background: var(--hover); }
  label.jrp-btn, .jrp-btn-dark { background: var(--dark); color: var(--dark-fg); border-color: var(--dark); }
  .jrp-fname { opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .jrp-pos { margin-left: auto; opacity: 0.6; font-variant-numeric: tabular-nums; }
  .jrp-save { margin-left: 8px; font-size: 11px; padding: 2px 7px; border-radius: 10px;
    white-space: nowrap; background: var(--line2); color: var(--fg); opacity: 0.75; }
  .jrp-save.dirty { background: transparent; opacity: 0.45; }
  .jrp-save.saving { opacity: 0.6; }
  .jrp-save.saved { background: var(--line); opacity: 0.85; }
  .jrp-icon { cursor: pointer; padding: 4px; border-radius: 6px; border: none; background: transparent;
    color: var(--fg); display: inline-flex; align-items: center; }
  .jrp-icon:active { background: var(--hover); }
  .jrp-body { position: relative; flex: 1; min-height: 0; }
  .jrp-viewer-wrap { position: absolute; inset: 0; }
  .jrp-viewer-root { position: absolute; inset: 0; }
  .jrp-viewer { position: absolute; inset: 0; overflow-y: scroll; background: var(--view-bg); }
  /* 页面总览(缩略图)全屏覆盖 viewer */
  .jrp-thumbs { position: absolute; inset: 0; z-index: 7; background: var(--view-bg); display: flex; flex-direction: column; }
  .jrp-thumbs.hidden { display: none; }
  .jrp-thumbs-bar { flex: none; display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    background: var(--chrome); border-bottom: 1px solid var(--line); }
  .jrp-thumbs-title { opacity: 0.6; font-size: 13px; }
  .jrp-thumbs-grid { flex: 1; overflow-y: auto; padding: 16px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(min(160px, 30vw), 1fr)); gap: 16px; align-content: start; }
  .jrp-thumb-card { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
  .jrp-thumb-wrap { width: 100%; box-sizing: border-box; aspect-ratio: 1 / 1.414; overflow: hidden;
    border: 2px solid var(--line); border-radius: 4px; background: var(--bg);
    display: flex; align-items: center; justify-content: center; transition: border-color 120ms ease; }
  .jrp-thumb-card:hover .jrp-thumb-wrap { border-color: var(--link); }
  .jrp-thumb-card.current .jrp-thumb-wrap { border-color: var(--link); border-width: 3px; }
  .jrp-thumb-wrap canvas { display: block; width: 100%; height: auto; }
  .jrp-thumb-label { font-size: 12px; opacity: 0.6; font-variant-numeric: tabular-nums; }
  .jrp-thumb-card.current .jrp-thumb-label { opacity: 1; font-weight: 600; color: var(--link); }
  .jrp-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.18); z-index: 8; }
  .jrp-gallery { position: absolute; left: 0; top: 0; bottom: 0; width: min(340px, 84vw); z-index: 9;
    background: var(--bg); border-right: 1px solid var(--line); display: flex; flex-direction: column;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18); }
  /* 论文库工具行：云账号 + 新建夹 + 上传，一行左对齐。 */
  .jrp-gal-head { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding: 6px 8px; border-bottom: 1px solid var(--line2); }
  .jrp-gal-head svg { width: 20px; height: 20px; }
  /* smart cloud 账号按钮（抄 WebPaint）：已登录=accent+勾，未登录=灰空心云，离线=琥珀。点开账号 popup。 */
  .jrp-cloud[data-state="signedin"] { color: var(--link); }
  .jrp-cloud[data-state="no-auth"] { color: var(--fg); opacity: 0.45; }
  .jrp-cloud[data-state="offline"] { color: #c0853f; }
  .jrp-cloud[data-state="busy"] { opacity: 0.35; }
  /* 账号 popup（云 icon 点开）：账号信息 + 登录/登出/刷新；外观抄 ☰ 菜单。 */
  .jrp-acct-backdrop { position: absolute; inset: 0; z-index: 10; }
  .jrp-acct-pop { position: absolute; top: 44px; left: 8px; z-index: 11; min-width: 180px;
    background: var(--menu-bg); border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.22); padding: 4px; }
  .jrp-acct-info { padding: 8px 14px; font-size: 12px; opacity: 0.6; }
  .jrp-crumbs { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--line2); }
  .jrp-crumbs a { cursor: pointer; color: var(--link); }
  .jrp-crumb-sep { opacity: 0.4; margin: 0 4px; }
  .jrp-gal-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .jrp-gal-folder, .jrp-gal-file { padding: 9px 14px; cursor: pointer; font-size: 14px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .jrp-gal-folder:hover, .jrp-gal-file:hover { background: var(--hover); }
  .jrp-gal-file-row { display: flex; align-items: center; }
  .jrp-gal-file-row .jrp-gal-file, .jrp-gal-file-row .jrp-gal-folder { flex: 1; }
  .jrp-gal-folder { display: flex; align-items: center; gap: 8px; }
  .jrp-folder-icon { width: 18px; height: 18px; flex: none; opacity: 0.7; }
  .jrp-gal-dots { border: none; background: transparent; color: var(--fg); opacity: 0.45; cursor: pointer; padding: 8px 12px; display: inline-flex; }
  .jrp-gal-dots:hover { opacity: 1; }
  .jrp-gal-dots svg { width: 18px; height: 18px; }
  .jrp-gal-act { border: none; background: transparent; color: var(--link); cursor: pointer; padding: 7px 9px; display: inline-flex; }
  .jrp-gal-act svg { width: 18px; height: 18px; }
  .jrp-act-del { color: #c0533f; }
  .jrp-gal-edit { flex: 1; box-sizing: border-box; margin: 4px 10px; padding: 7px 9px; border: 1px solid var(--line);
    border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 14px; }
  .jrp-newfolder-row { padding: 4px 10px; display: flex; }
  .jrp-gal-file.cached::after { content: '·'; color: #2a8a6a; margin-left: 6px; }
  .jrp-gal-file.pinned::after { content: '●'; color: var(--link); margin-left: 6px; font-size: 9px; vertical-align: middle; }
  .jrp-gal-msg { padding: 16px; opacity: 0.5; font-size: 13px; }
  /* 目录/阅读控制抽屉：左侧弹出（与论文库同侧，互斥）。首行控制条，下方 TOC。 */
  .jrp-outline { position: absolute; left: 0; top: 0; bottom: 0; width: min(320px, 84vw); z-index: 9;
    background: var(--bg); border-right: 1px solid var(--line); display: flex; flex-direction: column;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18); }
  .jrp-ctrlbar { flex: none; display: flex; align-items: center; justify-content: space-around;
    padding: 6px 4px; border-bottom: 1px solid var(--line2); }
  .jrp-ctrl { cursor: pointer; padding: 8px; border-radius: 8px; border: none; background: transparent;
    color: var(--fg); display: inline-flex; }
  .jrp-ctrl:active { background: var(--hover); }
  .jrp-ctrl svg { width: 22px; height: 22px; }
  .jrp-ol-row { padding: 8px 14px; cursor: pointer; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .jrp-ol-row:hover { background: var(--hover); }
  .jrp-icon.pad { margin-left: auto; }
  /* ☰ 系统菜单:z-index 提到所有层之上 + backdrop(避 z-order 坑) */
  .jrp-menu-backdrop { position: fixed; inset: 0; z-index: 99; }
  .jrp-menu { position: fixed; top: calc(40px + env(safe-area-inset-top)); right: 10px; z-index: 100;
    background: var(--menu-bg); border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.22); min-width: 180px; }
  .jrp-menu-item { display: block; width: 100%; text-align: left; padding: 11px 16px; border: none;
    background: transparent; color: var(--fg); font-size: 14px; cursor: pointer; }
  .jrp-menu-item:hover:not([disabled]) { background: var(--hover); }
  .jrp-menu-item[disabled] { opacity: 0.4; cursor: default; }
  .jrp-menu-sep { height: 1px; background: var(--line2); margin: 4px 0; }
  /* in-app 确认对话（红线：禁 system confirm）。 */
  .jrp-confirm-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 200; }
  .jrp-confirm { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 201;
    background: var(--menu-bg); border: 1px solid var(--line); border-radius: 12px; padding: 18px; min-width: 260px; max-width: 86vw;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .jrp-confirm-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .jrp-confirm-body { font-size: 13px; opacity: 0.7; margin-bottom: 16px; }
  .jrp-confirm-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .jrp-btn-danger { background: #c0533f; color: #fff; border-color: #c0533f; }
  .jrp-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: rgba(44,38,32,0.92); color: #f4efe4; padding: 8px 16px; border-radius: 8px;
    font-size: 13px; z-index: 60; pointer-events: none; }
  .jrp-update { bottom: 64px; background: #2c2620; pointer-events: auto; cursor: pointer; }
  /* PDF 纸页保持白(夜间 = 深底白页,适合阅读) */
  .jrp-viewer .pdfViewer .page { margin: 10px auto; border: none; box-shadow: 0 1px 8px rgba(0,0,0,0.3); }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./dist/jrp-612e69b4c033.mjs"></script>
</body>
</html>
