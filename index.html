<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>JustReadPapers</title>
<meta name="theme-color" content="#d8c8a8">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg">
<link rel="stylesheet" href="./vendor/pdfjs/web/pdf_viewer.css">
<style>
  html, body { margin: 0; height: 100%; background: #f4efe4; color: #2c2620;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #app, .jrp-shell { height: 100%; }
  .jrp-shell { display: flex; flex-direction: column; }
  .jrp-topbar { flex: none; display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; padding-top: calc(8px + env(safe-area-inset-top));
    background: #ece3d2; border-bottom: 1px solid #d8c8a8; font-size: 13px; }
  .jrp-controls { display: flex; gap: 6px; align-items: center; }
  .jrp-btn { cursor: pointer; padding: 5px 11px; border-radius: 6px; border: 1px solid #d8c8a8;
    background: #f4efe4; color: #2c2620; font-size: 13px; line-height: 1; }
  .jrp-btn:active { background: #e2d6bf; }
  label.jrp-btn { background: #2c2620; color: #f4efe4; border-color: #2c2620; }
  .jrp-fname { opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .jrp-pos { margin-left: auto; opacity: 0.6; font-variant-numeric: tabular-nums; }
  .jrp-viewer-wrap { position: relative; flex: 1; min-height: 0; }
  .jrp-viewer { position: absolute; inset: 0; overflow-y: scroll; }
  /* pdf.js 暗底改纸感暖底 */
  .jrp-viewer .pdfViewer .page { margin: 10px auto; border: none;
    box-shadow: 0 1px 6px rgba(0,0,0,0.18); }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./dist/jrp-addf9ca8f855.mjs"></script>
</body>
</html>
